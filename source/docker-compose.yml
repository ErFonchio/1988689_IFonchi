version: '3.8'

services:
  simulator:
    image: seismic-signal-simulator:multiarch_v1
    ports:
      - "8080:8080"
    networks:
      - seismic-network

  broker:
    build: ./broker
    ports:
      - "5002:5002"
    networks:
      - seismic-network
    depends_on:
      - simulator
    environment:
      - FLASK_ENV=production
      - SIMULATOR_HOST=simulator

  replica:
    build: ./replica
    ports:
      - "5001:5000"
    networks:
      - seismic-network
    depends_on:
      - simulator
      - broker
    environment:
      - FLASK_ENV=production
      - SIMULATOR_HOST=simulator

networks:
  seismic-network:
    driver: bridge
